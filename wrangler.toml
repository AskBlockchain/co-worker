# Used for LOCAL uploads: npx wrangler pages deploy public --project-name=co-worker
#
# Cloudflare Pages (Git) — in the project settings set:
#   Build command:  npm run build
#   Build output:   public
#   Deploy command: (leave EMPTY — Pages publishes "public" automatically after build)
#
# Do NOT use "npx wrangler deploy" here; that is for Workers, not Pages, and will fail.

name = "co-worker"
compatibility_date = "2025-03-01"
pages_build_output_dir = "public"
