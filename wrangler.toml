# Cloudflare Workers (Git / Workers Builds)
#   Build command:  npm run build
#   Deploy command: npx wrangler deploy
#
# Static HTML is produced in ./public by the build; this Worker serves those assets.
#
# Cloudflare Pages (alternative): use "Connect to Git" under Pages (not Workers),
# build command npm run build, output directory public, and no Worker deploy step.

name = "co-worker"
compatibility_date = "2025-03-01"

[assets]
directory = "./public"
